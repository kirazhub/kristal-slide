<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kristal Krallığı" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a0f3d" />
  <meta name="description" content="Candy Crush tarzı 3D kristal eşleştirme oyunu — Kristal Krallığı" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- iOS ana ekran ikonları -->
  <link rel="apple-touch-icon" href="public/ui/logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="public/ui/logo.png" />

  <title>💎 Kristal Krallığı</title>

  <!-- Fontlar -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Luckiest+Guy&display=swap" rel="stylesheet" />

  <!-- Stil dosyaları -->
  <link rel="stylesheet" href="css/ana.css" />
  <link rel="stylesheet" href="css/ekranlar.css" />
  <link rel="stylesheet" href="css/oyun.css" />

  <style>
    /* Yıldız patlaması animasyonu (modal için) */
    @keyframes yildiz-patla {
      0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
      60%  { transform: scale(1.3) rotate(20deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Giriş altında küçük istatistik */
    .giris-istatistik {
      display: flex;
      justify-content: space-around;
      gap: 15px;
      width: 100%;
      font-family: var(--font-baslik);
      font-size: 14px;
      letter-spacing: 2px;
      color: #d4a5ff;
      text-shadow: 0 0 8px rgba(200, 100, 255, 0.7);
    }

    .giris-istatistik .kutu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(100, 80, 180, 0.3);
      border: 2px solid rgba(200, 150, 255, 0.4);
      border-radius: 16px;
      min-width: 80px;
    }

    .giris-istatistik .sayi {
      font-size: 22px;
      color: #ffd700;
      -webkit-text-stroke: 1px #4a2d00;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
    }
  </style>
</head>
<body>

  <!-- Arka plan parçacıkları -->
  <div id="parcaciklarKatmani"></div>

  <!-- ======================================================
       EKRAN 1: GİRİŞ
       ====================================================== -->
  <div id="girisEkrani" class="ekran aktif">
    <div class="giris-icerik">
      <img class="giris-logo" src="public/ui/logo.png" alt="Kristal Krallığı" />

      <div class="giris-altyazi">✨ 100 BÖLÜM MACERA ✨</div>

      <div class="giris-butonlar">
        <button class="buton nabız" onclick="Arayuz.haritaGoster(); Ses?.sesTik();">🎮 OYNA</button>
      </div>

      <div class="giris-istatistik">
        <div class="kutu">
          <div class="sayi" id="girisBolumSayac">0</div>
          <div>BÖLÜM</div>
        </div>
        <div class="kutu">
          <div class="sayi" id="girisYildizSayac">0</div>
          <div>⭐ YILDIZ</div>
        </div>
        <div class="kutu">
          <div class="sayi" id="girisAltinSayac">0</div>
          <div>💰 ALTIN</div>
        </div>
      </div>

      <div class="giris-ayarlar">
        <button class="ayar-btn" id="sesBtn" title="Ses efektleri">🔊</button>
        <button class="ayar-btn" id="muzikBtn" title="Müzik">🎵</button>
        <button class="ayar-btn" id="titresimBtn" title="Titreşim">📳</button>
        <button class="ayar-btn" id="sifirlaBtn" title="İlerlemeyi sıfırla">🔄</button>
      </div>
    </div>
  </div>

  <!-- ======================================================
       EKRAN 2: HARİTA (bölüm listesi)
       ====================================================== -->
  <div id="haritaEkrani" class="ekran">
    <div class="harita-baslik">
      <button class="geri-btn" onclick="Arayuz.girisGoster(); Ses?.sesTik();">←</button>
      <h1>BÖLÜMLER</h1>
      <div class="harita-altin">💰 <span id="haritaAltin">0</span></div>
    </div>
    <div class="harita-liste" id="haritaListe"></div>
  </div>

  <!-- ======================================================
       EKRAN 3: OYUN
       ====================================================== -->
  <div id="oyunEkrani" class="ekran">
    <!-- Üst çubuk -->
    <div class="ust-cubuk">
      <button class="geri-btn" onclick="Arayuz.haritaGoster(); Ses?.sesTik();">←</button>
      <div class="altin-kutu">
        <span class="altin-emoji">💰</span>
        <span id="altinSayi">0</span>
      </div>
      <div class="hamle-kutu">
        <span id="hamleSayi">0</span>
      </div>
    </div>

    <!-- Hedef -->
    <div id="hedefBolge">
      <div class="hedef-kutu">
        <span class="hedef-bolum-no" id="bolumNo">BÖLÜM 1</span>
        <span class="hedef-metin" id="hedefMetni">Hedef yükleniyor...</span>
      </div>
    </div>

    <!-- Tahta -->
    <div class="tahta-kapsa">
      <div class="tahta-ic">
        <div class="tahta" id="tahta"></div>
      </div>
    </div>

    <!-- Güçler -->
    <div class="gucler">
      <button class="guc-btn" data-guc="cekic" onclick="Arayuz.oyun.gucSec('cekic')">
        <img src="public/ui/guc-cekic.png" alt="" draggable="false" />
        <span class="ad">ÇEKİÇ</span>
        <span class="sayi">0</span>
      </button>
      <button class="guc-btn" data-guc="karistir" onclick="Arayuz.oyun.gucSec('karistir')">
        <img src="public/ui/guc-karistir.png" alt="" draggable="false" />
        <span class="ad">KARIŞTIR</span>
        <span class="sayi">0</span>
      </button>
      <button class="guc-btn" data-guc="bomba" onclick="Arayuz.oyun.gucSec('bomba')">
        <img src="public/ui/guc-bomba.png" alt="" draggable="false" />
        <span class="ad">BOMBA</span>
        <span class="sayi">0</span>
      </button>
    </div>
  </div>

  <!-- Combo popup (oyun ekranının üstünde yüzer) -->
  <div class="combo-popup" id="comboPopup"></div>

  <!-- ======================================================
       MODAL: BÖLÜM TAMAMLANDI
       ====================================================== -->
  <div class="modal-arka" id="kazandiModal">
    <div class="modal">
      <h2>🎉 BAŞARDIN! 🎉</h2>
      <div class="yildizlar" id="kazandiYildizlar"></div>
      <p>BÖLÜM <span id="kazandiBolumNo">1</span> tamamlandı!</p>
      <p>Puan: <strong id="kazandiPuan">0</strong><br>
         Altın: <strong>💰 <span id="kazandiAltin">0</span></strong></p>
      <div class="buton-grup">
        <button class="buton kucuk mor" onclick="Arayuz.modalKapat('kazandiModal'); Arayuz.haritaGoster(); Ses?.sesTik();">🗺️ HARİTA</button>
        <button class="buton kucuk" id="kazandiSonrakiBtn">▶️ DEVAM</button>
      </div>
    </div>
  </div>

  <!-- ======================================================
       MODAL: BÖLÜM BAŞARISIZ
       ====================================================== -->
  <div class="modal-arka" id="kaybetModal">
    <div class="modal">
      <h2>💔 HAMLELER BİTTİ</h2>
      <p>BÖLÜM <span id="kaybetBolumNo">1</span> tamamlanamadı.</p>
      <p>Bir daha dene — her denemede daha iyi olacaksın!</p>
      <div class="buton-grup">
        <button class="buton kucuk mor" onclick="Arayuz.modalKapat('kaybetModal'); Arayuz.haritaGoster(); Ses?.sesTik();">🗺️ HARİTA</button>
        <button class="buton kucuk kirmizi" id="kaybetYenidenBtn">🔁 TEKRAR</button>
      </div>
    </div>
  </div>

  <!-- ======================================================
       SCRIPTLER
       ====================================================== -->
  <script src="data/bolumler.js"></script>
  <script src="js/kayit.js"></script>
  <script src="js/ses.js"></script>
  <script src="js/oyun.js"></script>
  <script src="js/arayuz.js"></script>
  <script>
    // ==========================================================
    // BAŞLATMA — sayfa yüklendiğinde
    // ==========================================================

    // Arka plan parçacıklarını doldur
    (function parcaciklar() {
      const katman = document.getElementById('parcaciklarKatmani');
      const semboller = ['💖', '⭐', '✨', '💎', '🌟', '💫'];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'parcacik';
        p.textContent = semboller[Math.floor(Math.random() * semboller.length)];
        p.style.left = (Math.random() * 100) + '%';
        p.style.animationDuration = (10 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 14) + 's';
        p.style.fontSize = (14 + Math.random() * 14) + 'px';
        p.style.color = ['#ff69b4', '#ffd700', '#00bcd4', '#9c27b0', '#4caf50'][Math.floor(Math.random() * 5)];
        katman.appendChild(p);
      }
    })();

    // Ayar düğmeleri
    function ayarlariYukle() {
      const kayit = KayitSistemi.yukle();
      const sesBtn = document.getElementById('sesBtn');
      const muzikBtn = document.getElementById('muzikBtn');
      const titresimBtn = document.getElementById('titresimBtn');

      sesBtn?.classList.toggle('kapalı', !kayit.ayarlar.ses);
      muzikBtn?.classList.toggle('kapalı', !kayit.ayarlar.muzik);
      titresimBtn?.classList.toggle('kapalı', !kayit.ayarlar.titresim);

      Ses.sesleriAc(kayit.ayarlar.ses);
      Ses.muzigiAc(kayit.ayarlar.muzik);
      window.Titresim.aktif = kayit.ayarlar.titresim;
    }

    document.getElementById('sesBtn')?.addEventListener('click', () => {
      Ses.baslat();
      const kayit = KayitSistemi.yukle();
      kayit.ayarlar.ses = !kayit.ayarlar.ses;
      KayitSistemi.yaz(kayit);
      ayarlariYukle();
      if (kayit.ayarlar.ses) Ses.sesTik();
    });

    document.getElementById('muzikBtn')?.addEventListener('click', () => {
      Ses.baslat();
      const kayit = KayitSistemi.yukle();
      kayit.ayarlar.muzik = !kayit.ayarlar.muzik;
      KayitSistemi.yaz(kayit);
      ayarlariYukle();
      Ses.sesTik();
    });

    document.getElementById('titresimBtn')?.addEventListener('click', () => {
      const kayit = KayitSistemi.yukle();
      kayit.ayarlar.titresim = !kayit.ayarlar.titresim;
      KayitSistemi.yaz(kayit);
      ayarlariYukle();
      Ses.sesTik();
      if (kayit.ayarlar.titresim && navigator.vibrate) navigator.vibrate(50);
    });

    document.getElementById('sifirlaBtn')?.addEventListener('click', () => {
      if (confirm('⚠️ Tüm ilerleme silinecek. Emin misin?')) {
        KayitSistemi.sifirla();
        ayarlariYukle();
        Arayuz.girisIstatistikleriGuncelle();
        alert('✨ İlerleme sıfırlandı. Yeni maceraya hazırsın!');
      }
    });

    // Kaybet modal — yeniden dene butonu
    document.getElementById('kaybetYenidenBtn')?.addEventListener('click', () => {
      Ses?.sesTik();
      const bolumNo = parseInt(document.getElementById('kaybetBolumNo').textContent);
      Arayuz.modalKapat('kaybetModal');
      Arayuz.bolumBaslat(bolumNo);
    });

    // Service Worker kaydet (offline çalışma)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(e => {
          console.log('SW kaydedilmedi:', e);
        });
      });
    }

    // Başlat
    ayarlariYukle();
    Arayuz.girisIstatistikleriGuncelle();

    // iOS sesleri ilk dokunuşta aç
    document.addEventListener('touchstart', () => Ses?.baslat(), { once: true });
    document.addEventListener('click', () => Ses?.baslat(), { once: true });
  </script>
</body>
</html>
